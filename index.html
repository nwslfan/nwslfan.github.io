function parseSchedule(csvText) {
    const { data } = Papa.parse(csvText, { header: true, skipEmptyLines: true });
    const weeks = [];
    let current = null;
    data.forEach(row => {
        if (/^WEEK\s+OF/i.test((row['WEEK'] || '').trim())) {
            current = { weekNum: weeks.length + 1, matches: [] };
            weeks.push(current);
        }
        if (current) {
            const home = (row['Home Team'] || '').trim();
            const away = (row['Away Team'] || '').trim();
            const date = (row['Date'] || '').trim();
            if (home && away && date) {
                current.matches.push({
                    date, day: (row['Day'] || '').trim(),
                    time: (row['Time'] || '').trim(),
                    home, away,
                    broadcast: (row['Broadcast'] || '').trim(),
                    winner: (row['Winner'] || '').trim(),
                    score: (row['Score'] || '').trim(),
                });
            }
        }
    });
    return weeks;
}

function parseScheduleDate(str) {
    const [m, d, y] = str.split('/').map(Number);
    return new Date(y, m - 1, d);
}

function pacificToDate(dateStr, timeStr) {
    if (!dateStr || !timeStr) return null;
    const [m, d, y] = dateStr.split('/').map(Number);
    const match = timeStr.trim().match(/(\d+):(\d+)\s*(AM|PM)/i);
    if (!match) return null;
    let h = +match[1], min = +match[2];
    if (match[3].toUpperCase() === 'PM' && h !== 12) h += 12;
    if (match[3].toUpperCase() === 'AM' && h === 12) h = 0;
    const guess = new Date(Date.UTC(y, m - 1, d, h, min));
    const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/Los_Angeles', hour: '2-digit', minute: '2-digit', hour12: false
    }).formatToParts(guess).reduce((a, {type, value}) => ({...a, [type]: value}), {});
    const diff = (h * 60 + min) - (+parts.hour * 60 + +parts.minute);
    return new Date(guess.getTime() + diff * 60000);
}

function formatLocalTime(dateStr, timeStr) {
    const date = pacificToDate(dateStr, timeStr);
    if (!date) return timeStr;
    return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZoneName: 'short' });
}

function getPicksDeadline(schedWeek) {
    if (!schedWeek?.matches?.length) return null;
    const firstGame = new Date(Math.min(...schedWeek.matches.map(m => parseScheduleDate(m.date))));
    const daysToWed = (firstGame.getDay() - 3 + 7) % 7;
    const wed = new Date(firstGame);
    wed.setDate(firstGame.getDate() - daysToWed);
    const m = wed.getMonth() + 1, d = wed.getDate(), y = wed.getFullYear();
    return pacificToDate(`${m}/${d}/${y}`, '12:00 PM');
}

function dateRange(week) {
    if (!week?.matches?.length) return '';
    const dates = week.matches.map(m => parseScheduleDate(m.date));
    const first = new Date(Math.min(...dates));
    const last  = new Date(Math.max(...dates));
    const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return first.getTime() === last.getTime() ? fmt(first) : `${fmt(first)} – ${fmt(last)}`;
}

function currentScheduleWeek(weeks) {
    if (!weeks.length) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    for (const w of weeks) {
        const last = new Date(Math.max(...w.matches.map(m => parseScheduleDate(m.date))));
        if (last >= today) return w;
    }
    return weeks[weeks.length - 1];
}

function isToday(dateStr) {
    const d = parseScheduleDate(dateStr), t = new Date();
    return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}

function isFuture(dateStr) {
    const d = parseScheduleDate(dateStr); d.setHours(23,59,59);
    return d >= new Date();
}

function formatScore(s) {
    const parts = s.split(/(\d+\s*[–-]\s*\d+)/);
    return parts.map((p, i) => /\d/.test(p) ? <span key={i} className="text-pink-400">{p}</span> : formatTeamName(p));
}

function formatTeamName(s) {
    return s
        .replace(/\bnorth carolina\b/gi, 'NC')
        .replace(/\bkansas city\b/gi, 'KC')
        .replace(/\bangel city\s*fc\b/gi, 'Angel City')
        .replace(/\bseattle reign\s*fc\b/gi, 'Seattle Reign')
        .replace(/\butah royals\s*fc\b/gi, 'Utah Royals')
        .replace(/\bbay\b(?!\s*fc)/gi, 'Bay FC')
        .replace(/\bfc\b/gi, 'FC');
}

function formatBroadcast(str) {
    if (!str) return '';
    const map = { 'prime video': 'Prime Video', 'abc': 'ABC', 'espn': 'ESPN', 'espn2': 'ESPN2',
        'espn deportes': 'ESPN Dep.', 'ion': 'ION', 'cbs': 'CBS', 'cbs sports': 'CBS Sports',
        'nwsl+': 'NWSL+', 'victory+': 'Victory+', 'paramount+': 'Paramount+', 'espn tbd': 'ESPN' };
    const parts = str.split(/;\s*/).map(s => map[s.toLowerCase().trim()] || s.trim()).filter(Boolean);
    // dedupe and show max 2
    return [...new Set(parts)].slice(0, 2).join(' / ');
}

// Loose team name matching for schedule ↔ picks cross-reference
async function fetchEspnScores(startDate, endDate) {
    const fmt = d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/usa.nwsl/scoreboard?dates=${fmt(startDate)}-${fmt(endDate)}`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`ESPN ${r.status}`);
    const data = await r.json();
    return (data.events || []).map(event => {
        const comp = event.competitions[0];
        const home = comp.competitors.find(c => c.homeAway === 'home');
        const away = comp.competitors.find(c => c.homeAway === 'away');
        const finished = event.status.type.completed;
        const winner = finished
            ? (home?.winner ? home.team.displayName : away?.winner ? away.team.displayName : 'Draw')
            : null;
        const score = finished ? `${home?.score}-${away?.score}` : null;
        return { home: home?.team.displayName, away: away?.team.displayName, winner, score };
    });
}

function normTeam(s) {
    return s.toLowerCase()
        .replace(/\s*fc\s*$/i, '')
        .replace(/^kc\b/, 'kansas city')
        .replace(/\bbay\b$/, 'bay fc')
        .trim();
}
function teamsMatch(a, b) {
    const na = normTeam(a), nb = normTeam(b);
    return na === nb || na.includes(nb) || nb.includes(na);
}
function findScheduleMatch(schedWeeks, schedWeekNum, homePickStr, awayPickStr) {
    const sw = schedWeeks.find(w => w.weekNum === schedWeekNum);

    return sw.matches.find(m => teamsMatch(m.home, h) && teamsMatch(m.away, a)) || null;
}

function parseFormCSV(csvText) {
    const { data } = Papa.parse(csvText, { header: true, skipEmptyLines: true });
    if (!data.length) return [];
    const headers = Object.keys(data[0]);
    const teamNameCols = headers.filter(h => /team.?name/i.test(h));
    const teamNameCol = teamNameCols[0];
    const nicknamCol  = teamNameCols[1];
    const fullNameCol = headers.find(h => /full.?name/i.test(h) && !/team/i.test(h));
    const emailCol    = headers.find(h => /email/i.test(h));
    const tsCol       = headers.find(h => /timestamp/i.test(h));
    const matchCols   = headers.filter(h => / vs /i.test(h));
    const bonusCol    = headers.find(h => /^bonus/i.test(h.trim()));
    const byPlayer = {};
    data.forEach(row => {
        const primaryName = teamNameCol && row[teamNameCol]?.trim();
        const player = (
            (primaryName && !/^i'?m new$/i.test(primaryName) ? primaryName : null) ||
            (nicknamCol  && row[nicknamCol]?.trim()) ||
            (fullNameCol && row[fullNameCol]?.trim()) ||
            (emailCol    && row[emailCol]?.trim()) || 'Unknown'
        );
        const ts = tsCol ? row[tsCol] : '';
        if (!byPlayer[player] || ts > byPlayer[player].timestamp) {
            const picks = {};
            matchCols.forEach(col => { if (row[col]?.trim()) picks[col] = row[col].trim(); });
            byPlayer[player] = { player, timestamp: ts, picks,
                bonus: bonusCol ? (parseInt(row[bonusCol]) || null) : null };
        }
    });
    return Object.values(byPlayer);
}

            bonusWinners = new Set(bonusGuesses.filter(g => Math.abs(g.guess - bonusAnswer) === minDiff).map(g => g.player));
        }

        picks.forEach(p => {
            let correct = 0, underdogBonus = 0;
            const pickDetails = [];
            Object.entries(p.picks).forEach(([match, pick]) => {
                const result = normResults[match.toLowerCase().trim()];
                const isCorrect = result !== undefined && normTeam(pick) === result;
                const matchDist = dist[match] || { total: 0 };
                const pct = matchDist.total > 0 ? (matchDist[normalizeResult(pick)] || 0) / matchDist.total : 1;
                const isUnderdog = isCorrect && pct < CONFIG.bonusThreshold;
                if (isCorrect) correct++;
                if (isUnderdog) underdogBonus++;
                pickDetails.push({ match, pick, result: result || null, correct: isCorrect, isUnderdog, pct, dist: matchDist });
            });
            weekScores[week][p.player] = { correct, underdogBonus, total: correct + underdogBonus,
                picks: pickDetails, bonusGuess: p.bonus, bonusWinner: bonusWinners.has(p.player) };
        });
        weekScores[week]._meta = { dist, normResults, bonusAnswer, bonusWinners };
    });

    const weeklyWinners = {};
    weeks.forEach(w => {
        const scores = allPlayers.map(p => ({ player: p, total: weekScores[w]?.[p]?.total || 0 }));
        const max = Math.max(...scores.map(s => s.total));
        weeklyWinners[w] = max > 0 ? scores.filter(s => s.total === max).map(s => s.player) : [];
    });

    const scoredWeeks = weekData.filter(w => Object.keys(w.results || {}).length > 0).map(w => w.week);
    const fullyScored = new Set(weekData.filter(wd => {
        const { dist={}, normResults={} } = weekScores[wd.week]?._meta || {};
        const allMatches = Object.keys(dist);
        return allMatches.length > 0 && allMatches.every(m => normResults[m.toLowerCase().trim()] !== undefined);
    }).map(wd => wd.week));
    const standings = allPlayers.map(player => {
        const totalCorrect = scoredWeeks.reduce((s,w) => s + (weekScores[w]?.[player]?.correct || 0), 0);
        const totalUnderdogBonus = scoredWeeks.reduce((s,w) => s + (weekScores[w]?.[player]?.underdogBonus || 0), 0);
        const totalPicks = scoredWeeks.reduce((s,w) => s + (weekScores[w]?.[player]?.picks?.filter(p => p.result !== null).length || 0), 0);
        const scorePct = totalPicks > 0 ? Math.round((totalCorrect + totalUnderdogBonus) / totalPicks * 1000) / 10 : 0;
        const weeklyWins = weeks.filter(w => fullyScored.has(w) && weeklyWinners[w]?.includes(player)).length;
        const bonusWins  = weeks.filter(w => weekScores[w]?.[player]?.bonusWinner).length;
        return { player, totalCorrect, totalUnderdogBonus, totalPicks, scorePct, weeklyWins, bonusWins };
    });
    standings.sort((a,b) => {
        if (b.scorePct !== a.scorePct) return b.scorePct - a.scorePct;
        if (b.totalCorrect !== a.totalCorrect) return b.totalCorrect - a.totalCorrect;
        if (b.weeklyWins !== a.weeklyWins) return b.weeklyWins - a.weeklyWins;
        return b.bonusWins - a.bonusWins;
    });
    return { standings, weeks, scoredWeeks, weekScores, weeklyWinners };
}

function PrizePool({ playerCount }) {
    const pool = playerCount * CONFIG.entryFee;
    const payouts = CONFIG.payoutPct.map(p => Math.floor(pool * p));
    const labels = ['1st','2nd','3rd'], colors = ['text-amber-400','text-slate-400','text-amber-700'];
    return (
        <div className="card p-5 mb-5">
            <div className="text-white/85 text-xs uppercase tracking-widest mb-4">Prize Pool</div>
            <div className="flex gap-3">
                <div className="flex-1 text-center border-r border-white/10 pr-3">
                    <div className="text-white text-2xl font-bold">${pool}</div>
                    <div className="text-white/75 text-xs mt-1">{playerCount} players</div>
                </div>
                {payouts.map((amt, i) => (
                    <div key={i} className="flex-1 text-center">
                        <div className={`text-xl font-bold ${colors[i]}`}>${amt}</div>
                        <div className="text-white/75 text-xs mt-1">{labels[i]}</div>
                    </div>

            </div>
        </div>

}

    return (
        <div className="card mb-5 overflow-hidden">
            <div className="px-5 pt-5 pb-2 flex items-center justify-between">
                <div className="text-white/85 text-xs uppercase tracking-widest">Standings</div>
                <div className="text-white/45 text-xs uppercase tracking-widest">Accuracy</div>
            </div>
            {standings.map((s, i) => {
                const pct = (s.scorePct / maxPct) * 100;
                const isOpen = expanded === s.player;

                return (
                    <div key={s.player}>

                            <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 ${rankClass}`}>{i+1}</div>

                                <div className="flex items-center gap-1.5 mb-1.5 flex-wrap">
                                    <span className="text-white font-medium text-sm truncate">{s.player}</span>
                                    {s.weeklyWins > 0 && <span className="text-amber-400 text-xs">🏆 ×{s.weeklyWins}</span>}
                                </div>
                                <div className="bg-white/10 rounded-full overflow-hidden" style={{height:5}}>

                                            <span className="text-white/85 truncate flex-1">{label}</span>

function ScheduleSection({ scheduleWeeks }) {
    const [viewWeekNum, setViewWeekNum] = useState(null);
    const activeWeek = scheduleWeeks.find(w => w.weekNum === viewWeekNum) || currentScheduleWeek(scheduleWeeks);
    if (!activeWeek) return null;

    // Group matches by day
    const byDay = {};
    activeWeek.matches.forEach(m => {
        if (!byDay[m.date]) byDay[m.date] = { day: m.day, date: m.date, matches: [] };
        byDay[m.date].matches.push(m);
    });
    const days = Object.values(byDay).sort((a,b) => parseScheduleDate(a.date) - parseScheduleDate(b.date));
    const dr = dateRange(activeWeek);

    return (
        <div className="card mb-5 overflow-hidden">
            <div className="px-5 pt-5 pb-3">
                <div className="flex items-center justify-between mb-3">
                    <div>
                        <h2 className="text-white font-semibold">Schedule</h2>
                        <div className="text-white/75 text-xs mt-0.5">{dr}</div>
                    </div>
                    <div className="text-pink-500 text-xs font-bold uppercase tracking-wider">Week {activeWeek.weekNum}</div>
                </div>
                {/* Week selector */}
                <div className="pills-scroll flex gap-1.5 overflow-x-auto">
                    {scheduleWeeks.map(w => {
                        const isCurrent = w.weekNum === currentScheduleWeek(scheduleWeeks)?.weekNum;
                        return (
                            <button key={w.weekNum}
                                onClick={() => setViewWeekNum(w.weekNum)}
                                className={`week-pill flex-shrink-0 ${activeWeek.weekNum===w.weekNum?'week-pill-active':'week-pill-inactive'}${isCurrent?' week-pill-current-gold':''}`}
                                style={{padding:'3px 10px', fontSize:'0.7rem'}}>
                                {w.weekNum}
                            </button>
                        );
                    })}
                </div>
            </div>
            <div className="divide-y divide-white/5">
                {days.map(({ day, date, matches }) => {
                    const today = isToday(date);
                    const future = isFuture(date);
                    return (
                        <div key={date}>
                            <div className={`px-5 py-2 text-xs font-semibold uppercase tracking-wider flex items-center gap-1.5
                                ${today ? 'text-pink-400' : future ? 'text-white/90' : 'text-white/70'}`}>
                                {today && <span className="today-dot" />}
                                {day} · {parseScheduleDate(date).toLocaleDateString('en-US', {month:'short', day:'numeric'})}
                                {today && <span className="font-normal normal-case tracking-normal text-pink-400/70 ml-1">Today</span>}
                            </div>
                            {matches.map((m, i) => (
                                <a key={i} href={`https://www.google.com/search?q=${encodeURIComponent(`${m.home} vs ${m.away} ${m.date}`)}`} target="_blank" rel="noopener noreferrer"
                                    className={`px-5 py-2.5 flex items-center gap-3 cursor-pointer hover:bg-white/5 ${(!future && !today) || m.score ? 'opacity-40' : ''}`}>
                                    <div className="text-white/75 text-xs w-24 flex-shrink-0">{formatLocalTime(m.date, m.time)}</div>
                                    <div className="flex-1 min-w-0">
                                        <span className={`text-sm ${today||future?'text-white/80':'text-white/90'}`}>
                                            {(() => { const sg = m.score?.match(/(\d+)\s*[–-]\s*(\d+)/); return sg
                                                ? <>{formatTeamName(m.home)} <span className="text-white/70">{sg[1]}–{sg[2]}</span> {formatTeamName(m.away)}</>
                                                : <>{formatTeamName(m.home)} <span className="text-white/70">vs</span> {formatTeamName(m.away)}</>; })()}
                                        </span>
                                    </div>
                                    {!m.score && m.broadcast && (
                                        <div className="text-white/75 text-xs flex-shrink-0 text-right">{formatBroadcast(m.broadcast)}</div>
                                    )}
                                </a>
                            ))}
                        </div>
                    );
                })}
            </div>
        </div>
    );
}

function WeekSection({ weekNum, weekDef, weekScore, scheduleWeeks }) {
    const { results, bonusAnswer } = weekDef;
    const meta = weekScore?._meta || {};
    const { dist={}, normResults={}, bonusWinners=new Set() } = meta;

    const allMatches = new Set();
    Object.values(weekScore||{}).forEach(ps => { if (ps._meta) return; ps.picks?.forEach(p => allMatches.add(p.match)); });
    const allMatchList = [...allMatches];
    const matchList = allMatchList.filter(m => normResults[m.toLowerCase().trim()] !== undefined);

    const winnerPlayers = Object.entries(weekScore||{}).filter(([k])=>k!=='_meta').map(([p,s])=>({player:p,total:s.total}));
    const maxWk = winnerPlayers.length > 0 ? Math.max(...winnerPlayers.map(s=>s.total)) : 0;
    const weekWinners = maxWk > 0 ? winnerPlayers.filter(s=>s.total===maxWk).map(s=>s.player) : [];

    const bonusGuesses = Object.entries(weekScore||{})
        .filter(([k])=>k!=='_meta' && weekScore[k].bonusGuess!==null)
        .map(([p,s])=>({player:p, guess:s.bonusGuess, winner:s.bonusWinner}))
        .sort((a,b) => bonusAnswer!==null ? Math.abs(a.guess-bonusAnswer)-Math.abs(b.guess-bonusAnswer) : a.guess-b.guess);

    const hasResults = Object.keys(results).length > 0;
    const allIn = allMatchList.length > 0 && allMatchList.every(m => normResults[m.toLowerCase().trim()] !== undefined);

    // Try to find matching schedule week (same week num)
    const schedWeek = scheduleWeeks?.find(w => w.weekNum === weekNum);

    return (
        <div className="card mb-5 overflow-hidden">
            <div className="px-5 pt-5 pb-3 flex items-center justify-between">
                <div>
                    <h2 className="text-white font-semibold">Week {weekNum} — Picks</h2>
                    <div className="text-white/75 text-xs mt-0.5">
                        {!hasResults ? 'Awaiting results' : allIn ? 'All results in' : 'Partial results'}
                        {schedWeek && <span className="ml-2">{dateRange(schedWeek)}</span>}
                    </div>
                </div>
                {allIn && weekWinners.length > 0 && (
                    <div className="text-amber-400 text-xs text-right">
                        🏆 {weekWinners.length===1 ? weekWinners[0] : `${weekWinners.length}-way tie`}
                    </div>
                )}
            </div>
            {!hasResults && <div className="px-5 py-6 text-center text-white/60 text-sm">Picks are in — results pending</div>}
            <div className="divide-y divide-white/5">
                {hasResults && matchList.map((match, i) => {
                    const normKey = match.toLowerCase().trim();
                    const result = normResults[normKey];
                    const matchDist = dist[match] || { total: 0 };
                    const total = matchDist.total;
                    const parts = match.split(/ vs /i);
                    const home = parts[0]?.trim()||'', away = parts[1]?.trim()||'';
                    const outcomes = home && away ? [home,'Draw',away] : [];

                    // Find schedule match for broadcast info
                    const schedMatch = schedWeek?.matches?.find(m => teamsMatch(m.home, home) && teamsMatch(m.away, away));

                    return (
                        <div key={i} className="px-5 py-4">
                            <div className="mb-3">
                                <div className="flex items-start justify-between gap-2">
                                    <div className="text-white text-sm font-medium">
                                        {schedMatch?.score ? (() => { const [hs,as] = schedMatch.score.split('-'); return <>{formatTeamName(schedMatch.home)} <span className="text-pink-400">{hs} - {as}</span> {formatTeamName(schedMatch.away)}</>; })() : <>{formatTeamName(home)} <span className="text-white/70">vs</span> {formatTeamName(away)}</>}
                                    </div>
                                </div>
                                {!result && <div className="text-white/70 text-xs mt-0.5">Pending</div>}
                            </div>
                            <div className="space-y-2">
                                {outcomes.map(outcome => {
                                    const normO = normalizeResult(outcome);
                                    const count = matchDist[normO]||0;
                                    const pct = total > 0 ? count/total : 0;
                                    const isResult = result !== undefined && normTeam(outcome)===result;
                                    const isUnderdog = isResult && pct < CONFIG.bonusThreshold;
                                    return (
                                        <div key={outcome} className="flex items-center gap-2.5">
                                            <div className={`text-xs w-32 truncate flex-shrink-0 ${isResult?'text-pink-400 font-semibold':'text-white'}`}>{formatTeamName(outcome)}</div>
                                            <div className="flex-1 bg-white/10 rounded-full overflow-hidden" style={{height:4}}>
                                                <div className={`pick-bar ${isResult?'bg-pink-500':'bg-white'}`} style={{width:`${pct*100}%`}} />
                                            </div>
                                            <div className="text-white/80 text-xs w-9 text-right flex-shrink-0">{Math.round(pct*100)}%</div>
                                            <span className="flex-shrink-0" style={{width:'1.5rem', textAlign:'center'}}>{isUnderdog && <span className="bonus-pill" title="bonus">★</span>}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    );
                })}
                {allIn && bonusGuesses.length > 0 && (
                    <div className="px-5 py-4">
                        <div className="text-white/85 text-xs uppercase tracking-wider mb-3 flex items-center gap-2">
                            <span>Bonus: Total Goals</span>
                            {bonusAnswer!==null && <span className="text-white font-semibold normal-case tracking-normal">Actual: {bonusAnswer}</span>}
                        </div>
                        <div className="space-y-1.5">
                            {bonusGuesses.map(({player, guess, winner}) => (
                                <div key={player} className="flex items-center gap-3 text-xs">
                                    <span className={`flex-1 truncate ${winner?'text-amber-400 font-medium':'text-white/90'}`}>{player}</span>
                                    <span className={`font-medium ${winner?'text-amber-400':'text-white/85'}`}>{guess}</span>
                                    {bonusAnswer!==null && (
                                        <span className={`text-white/70 w-16 text-right ${winner?'text-amber-400/60':''}`}>
                                            {winner ? '★ closest' : `off ${Math.abs(guess-bonusAnswer)}`}
                                        </span>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                )}
                {hasResults && <div className="px-5 py-3 border-t border-white/10 text-white/60 text-xs text-center">
                    <span className="bonus-pill inline-block mr-1">★</span> Underdog bonus — extra point for correctly picking a team chosen by fewer than 30% of players
                </div>}
            </div>
        </div>
    );
}

function App() {
    const [picks, setPicks] = useState(null);
    const [scheduleWeeks, setScheduleWeeks] = useState(() => parseSchedule(SCHEDULE_CSV));
    const [loading, setLoading] = useState(true);
    const [errors, setErrors] = useState([]);
    const [usingDemo, setUsingDemo] = useState(false);
    const [activeWeek, setActiveWeek] = useState(null);

    useEffect(() => {
        async function load() {
            // Always try to fetch the schedule
            let liveSchedule = parseSchedule(SCHEDULE_CSV);
            try {
                const r = await fetch(SCHEDULE_URL);
                if (r.ok) { liveSchedule = parseSchedule(await r.text()); setScheduleWeeks(liveSchedule); }
            } catch (e) { /* schedule is optional display data */ }

            const configured = WEEKS.filter(w => w.picksUrl && !w.hidden);
            if (configured.length === 0) {
                setPicks(DEMO_WEEKS);
                setUsingDemo(true);
                setLoading(false);
                return;
            }

            const errs = [];
            const loaded = await Promise.all(configured.map(async wk => {
                try {
                    const r = await fetch(wk.picksUrl);
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    const picks = parseFormCSV(await r.text());
                    // Derive results from ESPN
                    const sw = liveSchedule.find(w => w.weekNum === wk.week);
                    const derivedResults = {};
                    if (sw && picks.length > 0) {
                        try {
                            const dates = sw.matches.map(m => parseScheduleDate(m.date));
                            const espnGames = await fetchEspnScores(
                                new Date(Math.min(...dates)),
                                new Date(Math.max(...dates))
                            );
                            // Merge ESPN scores into schedule for display
                            sw.matches.forEach(m => {
                                const g = espnGames.find(g => teamsMatch(g.home, m.home) && teamsMatch(g.away, m.away));
                                if (g) { m.winner = g.winner || ''; m.score = g.score || ''; }
                            });
                            const matchCols = [...new Set(picks.flatMap(p => Object.keys(p.picks)))];
                            matchCols.forEach(col => {
                                const parts = col.split(/ vs /i);
                                if (parts.length !== 2) return;
                                const [h, a] = parts.map(s => s.trim());
                                const g = espnGames.find(g => teamsMatch(g.home, h) && teamsMatch(g.away, a));
                                if (g?.winner) derivedResults[col] = g.winner;
                            });
                        } catch (e) { /* ESPN unavailable */ }
                    }
                    // Manual results in WEEKS config take precedence
                    return { ...wk, picks, results: { ...derivedResults, ...wk.results } };
                } catch (e) {
                    errs.push(`Week ${wk.week}: ${e.message}`);
                    return { ...wk, picks: [] };
                }
            }));
            setErrors(errs);
            setScheduleWeeks([...liveSchedule]);
            setPicks(loaded);
            setLoading(false);
        }
        load();
    }, []);

    const computed = useMemo(() => picks ? computeAll(picks) : null, [picks]);
    const weeks = computed?.weeks || [];
    const displayWeek = activeWeek ?? currentScheduleWeek(scheduleWeeks)?.weekNum ?? (weeks.length > 0 ? weeks[weeks.length-1] : null);
    const displayWeekDef = picks?.find(w => w.week === displayWeek);

    if (loading) return (
        <div className="page-bg min-h-screen flex items-center justify-center">
            <div className="text-white/75 text-sm">Loading...</div>
        </div>
    );

    return (
        <div className="page-bg">
            <div className="max-w-lg mx-auto px-4 py-8 pb-16">
                <div className="text-center mb-8">
                    <h1 className="text-white text-2xl font-bold">⚽ NWSL Fantasy League ⚽</h1>
                </div>

                {usingDemo && <div className="demo-banner">Showing demo data. Add Google Sheet URLs to <code className="font-mono">WEEKS</code> in the config.</div>}
                {errors.map((e,i) => <div key={i} className="error-banner">{e}</div>)}

                {computed && <PrizePool playerCount={computed.standings.length} />}

                <div className="card p-5 mb-5 text-white/85 text-sm leading-relaxed">
                    An easy way to follow the NWSL together — celebrating wins and laughing at bad picks along the way. Each week, fill out the Google Form and select the teams you think will WIN or DRAW. All submissions must be completed by Wednesdays at 12pm PT. You get 1 point for each correct pick, plus a bonus point if you correctly pick a winner chosen by fewer than 30% of players.
                </div>

                {computed && <Leaderboard standings={computed.standings} weekScores={computed.weekScores} weeks={weeks} scoredWeeks={computed.scoredWeeks || []} />}

                {computed && weeks.length > 0 && (() => {
                    const picksWeekNums = new Set(weeks);
                    const formOnlyWeeks = WEEKS.filter(w => w.formUrl && !w.hidden && !picksWeekNums.has(w.week) && (!w.picksUrl || formIsOpen(w)));
                    const formOnlyNums = new Set(formOnlyWeeks.map(w => w.week));
                    const futureSchedWeeks = scheduleWeeks.filter(sw =>
                        !picksWeekNums.has(sw.weekNum) &&
                        !formOnlyNums.has(sw.weekNum) &&
                        sw.matches.every(m => isFuture(m.date))
                    );
                    const allWeekPills = [
                        ...weeks.map(w => ({ weekNum: w, hasPicks: true })),
                        ...formOnlyWeeks.map(w => ({ weekNum: w.week, hasPicks: false })),
                        ...futureSchedWeeks.map(sw => ({ weekNum: sw.weekNum, hasPicks: false })),
                    ].sort((a, b) => a.weekNum - b.weekNum);
                    return (
                        <>
                            <div className="pills-scroll flex gap-2 overflow-x-auto mb-6">
                                {allWeekPills.map(({ weekNum, hasPicks }) => {
                                    const isCurrent = weekNum === currentScheduleWeek(scheduleWeeks)?.weekNum;
                                    return (
                                    <button key={weekNum} onClick={() => setActiveWeek(weekNum)}
                                        className={`week-pill ${displayWeek===weekNum?'week-pill-active':'week-pill-inactive'}${isCurrent?' week-pill-current-gold':''}`}>
                                        {weekNum === 3 ? 'Week 3' : weekNum}
                                    </button>);
                                })}
                            </div>
                            {displayWeek!==null && (() => {
                                const weekDef = picks?.find(w => w.week === displayWeek);
                                if (weekDef && !formIsOpen(weekDef)) return (
                                    <WeekSection weekNum={displayWeek} weekDef={weekDef}
                                        weekScore={computed.weekScores[displayWeek]} scheduleWeeks={scheduleWeeks} />
                                );
                                const sw = scheduleWeeks.find(w => w.weekNum === displayWeek);
                                const weekConfig = weekDef || WEEKS.find(w => w.week === displayWeek);
                                const deadline = sw ? getPicksDeadline(sw) : null;
                                const deadlineStr = deadline ? deadline.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }) + ' at ' + deadline.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZoneName: 'short' }) : null;
                                const submitters = weekDef?.picks?.map(p => p.player);
                                return (
                                    <div className="card p-5 text-center mb-5">
                                        <div className="text-white text-lg font-semibold mb-1">Make your picks for Week {displayWeek}</div>
                                        {sw && <div className="text-white/75 text-sm mb-1">{dateRange(sw)}</div>}
                                        {deadlineStr && <div className="text-white/60 text-xs mb-4">Submit by {deadlineStr}</div>}
                                        {weekConfig?.formUrl
                                            ? <a href={weekConfig.formUrl} target="_blank" rel="noopener noreferrer"
                                                className="inline-block bg-pink-500 hover:bg-pink-400 text-white font-semibold px-6 py-2 rounded-full text-sm transition-colors">
                                                Open Form
                                              </a>
                                            : <div className="text-white/60 text-sm">Form link coming soon</div>
                                        }
                                        {submitters && submitters.length > 0 && (
                                            <div className="mt-4 text-left">
                                                <div className="text-white/60 text-xs mb-1">{submitters.length} submitted so far:</div>
                                                {submitters.map(name => (
                                                    <div key={name} className="text-white/85 text-sm">{name}</div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                );
                            })()}
                        </>
                    );
                })()}

                {scheduleWeeks.length > 0 && <ScheduleSection scheduleWeeks={scheduleWeeks} />}

            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
