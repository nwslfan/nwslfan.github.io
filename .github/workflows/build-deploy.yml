name: Build and Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * *'  # Daily 9am UTC — refresh results.json (scores + kickoff times)
  workflow_dispatch:

permissions:
  contents: write   # to commit refreshed results.json
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh results.json
        run: node scripts/fetch-results.js

      - name: Commit results.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          if ! git diff --cached --quiet; then
            git commit -m "Update results.json [skip ci]"
            git push
          fi

      - name: Install esbuild
        run: npm install esbuild --no-save --no-audit --no-fund

      - name: Build dist/
        run: node scripts/build.js

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
