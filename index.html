// ================================================================
// CSV PARSING — reads Google Form response format directly
// ================================================================
function normalizeHeader(h) {
    return h.toLowerCase().trim().replace(/\s+/g, ' ');
}

function isMatchColumn(header) {
    return / vs /i.test(header);
}

function isBonusColumn(header) {
    return /^bonus/i.test(header.trim());
}

function isTeamNameColumn(header) {
    return /team.?name/i.test(header);
}

function isFullNameColumn(header) {
    return /full.?name/i.test(header) && !isTeamNameColumn(header);
}

function parseFormCSV(csvText) {
    const { data } = Papa.parse(csvText, { header: true, skipEmptyLines: true });
    if (!data.length) return [];

    const headers = Object.keys(data[0]);
    const teamNameCol = headers.find(isTeamNameColumn);
    const fullNameCol = headers.find(isFullNameColumn);
    const emailCol = headers.find(h => /email/i.test(h));
    const timestampCol = headers.find(h => /timestamp/i.test(h));
    const matchCols = headers.filter(isMatchColumn);
    const bonusCol = headers.find(isBonusColumn);

    // Deduplicate: if same player submits twice, keep latest (by timestamp)
    const byPlayer = {};
    data.forEach(row => {
        const player = (
            (teamNameCol && row[teamNameCol]?.trim()) ||
            (fullNameCol && row[fullNameCol]?.trim()) ||
            (emailCol && row[emailCol]?.trim()) ||
            'Unknown'
        );
        const ts = timestampCol ? row[timestampCol] : '';
        const existing = byPlayer[player];
        if (!existing || ts > existing.timestamp) {
            const picks = {};
            matchCols.forEach(col => {
                if (row[col]?.trim()) picks[col] = row[col].trim();
            });
            byPlayer[player] = {
                player,
                timestamp: ts,
                picks,
                bonus: bonusCol ? parseInt(row[bonusCol]) || null : null,
            };
        }
    });

    return Object.values(byPlayer);
}


// ================================================================
// SCORING ENGINE
// ================================================================
function normalizeResult(str) {
    return str?.toLowerCase().trim();
}

function computeAll(weekData) {
    // weekData: array of { week, picks (parsed), results, bonusAnswer }
    // picks: array of { player, picks: { [matchHeader]: teamName }, bonus: number|null }

    const allPlayers = [...new Set(weekData.flatMap(w => w.picks.map(p => p.player)))].sort();
    const weeks = weekData.map(w => w.week).sort((a, b) => a - b);

    // Per-week scoring
    const weekScores = {}; // { [week]: { [player]: { correct, underdogBonus, picks, bonusGuess, bonusCorrect } } }

    weekData.forEach(({ week, picks, results, bonusAnswer }) => {
        weekScores[week] = {};

        // Build pick distribution per match
        const dist = {};
        picks.forEach(p => {
            Object.entries(p.picks).forEach(([match, pick]) => {
                if (!dist[match]) dist[match] = { total: 0 };
                dist[match][normalizeResult(pick)] = (dist[match][normalizeResult(pick)] || 0) + 1;
                dist[match].total++;
            });
        });

        // Normalize results keys
        const normalizedResults = {};
        Object.entries(results).forEach(([match, result]) => {
            normalizedResults[normalizeHeader(match)] = normalizeResult(result);
        });

        // Bonus: find closest guess(es)
        const bonusGuesses = picks
            .filter(p => p.bonus !== null && !isNaN(p.bonus))
            .map(p => ({ player: p.player, guess: p.bonus }));
        let bonusWinners = new Set();
        if (bonusAnswer !== null && bonusGuesses.length > 0) {
            const minDiff = Math.min(...bonusGuesses.map(g => Math.abs(g.guess - bonusAnswer)));
            bonusWinners = new Set(bonusGuesses.filter(g => Math.abs(g.guess - bonusAnswer) === minDiff).map(g => g.player));
        }

        picks.forEach(p => {
            let correct = 0, underdogBonus = 0;
            const pickDetails = [];

            Object.entries(p.picks).forEach(([match, pick]) => {
                const normMatch = normalizeHeader(match);
                const result = normalizedResults[normMatch];
                const isCorrect = result !== undefined && normalizeResult(pick) === result;
                const matchDist = dist[match] || { total: 0 };
                const pct = matchDist.total > 0 ? (matchDist[normalizeResult(pick)] || 0) / matchDist.total : 1;
                const isUnderdog = isCorrect && pct < CONFIG.bonusThreshold;

                if (isCorrect) correct++;
                if (isUnderdog) underdogBonus++;

                pickDetails.push({
                    match, pick, result: result ? result : null,
                    correct: isCorrect, isUnderdog, pct,
                    dist: matchDist,
                });
            });

            weekScores[week][p.player] = {
                correct,
                underdogBonus,
                total: correct + underdogBonus,
                picks: pickDetails,
                bonusGuess: p.bonus,
                bonusWinner: bonusWinners.has(p.player),
            };
        });

        // Store dist and normalized results for display
        weekScores[week]._meta = { dist, normalizedResults, bonusAnswer, bonusWinners };
    });

    // Weekly winners
    const weeklyWinners = {};
    weeks.forEach(w => {
        const scores = allPlayers.map(p => ({ player: p, total: weekScores[w]?.[p]?.total || 0 }));
        const max = Math.max(...scores.map(s => s.total));
        weeklyWinners[w] = max > 0 ? scores.filter(s => s.total === max).map(s => s.player) : [];
    });

    // Overall standings
    const standings = allPlayers.map(player => {
        const totalCorrect = weeks.reduce((s, w) => s + (weekScores[w]?.[player]?.correct || 0), 0);
        const totalUnderdogBonus = weeks.reduce((s, w) => s + (weekScores[w]?.[player]?.underdogBonus || 0), 0);
        const weeklyWins = weeks.filter(w => weeklyWinners[w]?.includes(player)).length;
        const bonusWins = weeks.filter(w => weekScores[w]?.[player]?.bonusWinner).length;
        return { player, totalCorrect, totalUnderdogBonus, weeklyWins, bonusWins };
    });

    standings.sort((a, b) => {
        const ta = a.totalCorrect + a.totalUnderdogBonus;
        const tb = b.totalCorrect + b.totalUnderdogBonus;
        if (tb !== ta) return tb - ta;
        if (b.totalCorrect !== a.totalCorrect) return b.totalCorrect - a.totalCorrect;
        if (b.weeklyWins !== a.weeklyWins) return b.weeklyWins - a.weeklyWins;
        return b.bonusWins - a.bonusWins;
    });

    return { standings, weeks, weekScores, weeklyWinners };
}

function PrizePool({ playerCount }) {

    const payouts = CONFIG.payoutPct.map(pct => Math.floor(pool * pct));

                        <div className="text-white/30 text-xs mt-1">{labels[i]}</div>
                    </div>
                ))}
            </div>
        </div>
    );
}

function Leaderboard({ standings, weekScores, weeks }) {
    const [expanded, setExpanded] = useState(null);
    const maxPts = standings.length > 0 ? standings[0].totalCorrect + standings[0].totalUnderdogBonus : 1;

    return (
        <div className="card mb-5 overflow-hidden">
            <div className="px-5 pt-5 pb-2">
                <div className="text-white/40 text-xs uppercase tracking-widest">Standings</div>
            </div>
            {standings.map((s, i) => {
                const total = s.totalCorrect + s.totalUnderdogBonus;
                const barPct = maxPts > 0 ? (total / maxPts) * 100 : 0;
                const isOpen = expanded === s.player;
                const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';

                return (
                    <div key={s.player}>
                        <button
                            onClick={() => setExpanded(isOpen ? null : s.player)}
                            className="w-full px-5 py-3.5 flex items-center gap-3 border-t border-white/5 text-left"
                            style={{ background: isOpen ? 'rgba(255,255,255,0.03)' : 'transparent' }}
                        >
                            <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 ${rankClass}`}>
                                {i + 1}
                            </div>
                            <div className="flex-1 min-w-0">
                                <div className="flex items-center gap-1.5 mb-1.5 flex-wrap">
                                    <span className="text-white font-medium text-sm truncate">{s.player}</span>
                                    {s.weeklyWins > 0 && <span className="text-amber-400 text-xs flex-shrink-0">🏆 ×{s.weeklyWins}</span>}
                                </div>
                                <div className="bg-white/10 rounded-full overflow-hidden" style={{ height: 5 }}>
                                    <div className="leader-bar bg-pink-500" style={{ width: `${barPct}%` }} />
                                </div>
                            </div>
                            <div className="text-right flex-shrink-0">
                                <div className="text-white font-bold text-xl leading-none">{total}</div>
                                <div className="text-white/30 text-xs mt-0.5">
                                    {s.totalCorrect} + <span className="text-purple-400">{s.totalUnderdogBonus}★</span>
                                </div>
                            </div>
                        </button>
                        {isOpen && <PickHistory player={s.player} weekScores={weekScores} weeks={weeks} />}
                    </div>
                );
            })}
        </div>
    );
}

function PickHistory({ player, weekScores, weeks }) {
    return (
        <div className="card-inset px-5 py-4">
            <div className="text-white/30 text-xs uppercase tracking-wider mb-3">Pick History</div>
            <div className="space-y-4">
                {weeks.map(w => {
                    const wd = weekScores[w]?.[player];
                    if (!wd) return (
                        <div key={w} className="text-white/20 text-xs">Week {w} — no submission</div>
                    );
                    return (
                        <div key={w}>
                            <div className="flex justify-between items-center mb-2">
                                <span className="text-white/50 text-xs font-medium">Week {w}</span>
                                <span className="text-white text-xs">
                                    {wd.total} pt{wd.total !== 1 ? 's' : ''}
                                    {wd.underdogBonus > 0 && <span className="text-purple-400"> (+{wd.underdogBonus} bonus)</span>}
                                </span>
                            </div>
                            <div className="space-y-1.5">
                                {wd.picks.map((pick, i) => {
                                    // Extract team names from match header
                                    const parts = pick.match.split(/ vs /i);
                                    const matchLabel = parts.length === 2
                                        ? `${parts[0].trim()} vs ${parts[1].trim()}`
                                        : pick.match;
                                    return (
                                        <div key={i} className="flex items-center gap-2 text-xs">
                                            <span className={`w-4 h-4 rounded-full flex-shrink-0 flex items-center justify-center font-bold text-[9px]
                                                ${pick.result === null ? 'bg-white/10 text-white/30'
                                                  : pick.correct ? 'bg-green-500/25 text-green-400'
                                                  : 'bg-red-500/20 text-red-400'}`}>
                                                {pick.result === null ? '?' : pick.correct ? '✓' : '✗'}
                                            </span>
                                            <span className="text-white/40 truncate flex-1">{matchLabel}</span>
                                            <span className={`flex-shrink-0 font-medium
                                                ${pick.correct ? 'text-green-400'
                                                  : pick.result === null ? 'text-white/30'
                                                  : 'text-red-400'}`}>
                                                {pick.pick}
                                            </span>
                                            {pick.isUnderdog && <span className="bonus-pill flex-shrink-0">★</span>}
                                        </div>
                                    );
                                })}
                                {wd.bonusGuess !== null && (
                                    <div className="flex items-center gap-2 text-xs mt-2 pt-2 border-t border-white/5">
                                        <span className={`w-4 h-4 rounded-full flex-shrink-0 flex items-center justify-center text-[9px]
                                            ${weekScores[w]?._meta?.bonusAnswer === null ? 'bg-white/10 text-white/30'
                                              : wd.bonusWinner ? 'bg-amber-500/25 text-amber-400'
                                              : 'bg-white/10 text-white/30'}`}>
                                            {weekScores[w]?._meta?.bonusAnswer === null ? '?' : wd.bonusWinner ? '★' : '·'}
                                        </span>
                                        <span className="text-white/30 flex-1">Total goals guess</span>
                                        <span className={`flex-shrink-0 font-medium ${wd.bonusWinner ? 'text-amber-400' : 'text-white/40'}`}>
                                            {wd.bonusGuess}
                                        </span>
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                })}
            </div>
        </div>
    );
}

function WeekSection({ weekNum, weekDef, weekScore }) {
    const { results, bonusAnswer } = weekDef;
    const meta = weekScore?._meta || {};
    const { dist = {}, normalizedResults = {}, bonusWinners = new Set() } = meta;

    // Get all unique matches from picks
    const allMatches = new Set();
    Object.values(weekScore || {}).forEach(ps => {
        if (ps._meta) return;
        ps.picks?.forEach(p => allMatches.add(p.match));
    });
    const matchList = [...allMatches];

    // Weekly winner(s)
    const winnerPlayers = Object.entries(weekScore || {})
        .filter(([k]) => k !== '_meta')
        .map(([player, s]) => ({ player, total: s.total }));
    const maxWk = winnerPlayers.length > 0 ? Math.max(...winnerPlayers.map(s => s.total)) : 0;
    const weekWinners = maxWk > 0 ? winnerPlayers.filter(s => s.total === maxWk).map(s => s.player) : [];

    // Bonus guesses
    const bonusGuesses = Object.entries(weekScore || {})
        .filter(([k]) => k !== '_meta' && weekScore[k].bonusGuess !== null)
        .map(([player, s]) => ({ player, guess: s.bonusGuess, winner: s.bonusWinner }))
        .sort((a, b) => {
            if (bonusAnswer !== null) return Math.abs(a.guess - bonusAnswer) - Math.abs(b.guess - bonusAnswer);
            return a.guess - b.guess;
        });

    const hasAnyResults = Object.keys(results).length > 0;
    const allResultsIn = matchList.length > 0 && matchList.every(m => normalizedResults[normalizeHeader(m)] !== undefined);

    return (
        <div className="card mb-5 overflow-hidden">
            <div className="px-5 pt-5 pb-3 flex items-center justify-between">
                <div>
                    <h2 className="text-white font-semibold">Week {weekNum}</h2>
                    <div className="text-white/30 text-xs mt-0.5">
                        {!hasAnyResults ? 'Awaiting results' : allResultsIn ? 'All results in' : 'Results partial'}
                    </div>
                </div>
                {weekWinners.length > 0 && (
                    <div className="text-amber-400 text-xs text-right">
                        🏆 {weekWinners.length === 1 ? weekWinners[0] : `${weekWinners.length}-way tie`}
                    </div>
                )}
            </div>

            <div className="divide-y divide-white/5">
                {matchList.map((match, i) => {
                    const normKey = normalizeHeader(match);
                    const result = normalizedResults[normKey];
                    const matchDist = dist[match] || { total: 0 };
                    const total = matchDist.total;

                    // Extract home/away from header
                    const parts = match.split(/ vs /i);
                    const home = parts[0]?.trim() || '';
                    const away = parts[1]?.trim() || '';
                    const outcomes = home && away ? [home, 'Draw', away] : [];

                    return (
                        <div key={i} className="px-5 py-4">
                            <div className="mb-3">
                                <div className="text-white text-sm font-medium">
                                    {home} <span className="text-white/25">vs</span> {away}
                                </div>
                                {result
                                    ? <div className="text-green-400 text-xs mt-0.5 capitalize">Result: {result}</div>
                                    : <div className="text-white/25 text-xs mt-0.5">Pending</div>
                                }
                            </div>
                            <div className="space-y-2">
                                {outcomes.map(outcome => {
                                    const normOutcome = normalizeResult(outcome);
                                    const count = matchDist[normOutcome] || 0;
                                    const pct = total > 0 ? count / total : 0;
                                    const isResult = normOutcome === result;
                                    const isUnderdog = isResult && pct < CONFIG.bonusThreshold;
                                    return (
                                        <div key={outcome} className="flex items-center gap-2.5">
                                            <div className={`text-xs w-32 truncate flex-shrink-0
                                                ${isResult ? 'text-green-400 font-semibold' : 'text-white/40'}`}>
                                                {outcome}
                                            </div>
                                            <div className="flex-1 bg-white/10 rounded-full overflow-hidden" style={{ height: 4 }}>
                                                <div className={`pick-bar ${isResult ? 'bg-green-500' : 'bg-white/20'}`}
                                                    style={{ width: `${pct * 100}%` }} />
                                            </div>
                                            <div className="text-white/35 text-xs w-9 text-right flex-shrink-0">
                                                {Math.round(pct * 100)}%
                                            </div>
                                            {isUnderdog && <span className="bonus-pill flex-shrink-0">★ bonus</span>}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    );
                })}

                {/* Bonus question */}
                {bonusGuesses.length > 0 && (
                    <div className="px-5 py-4">
                        <div className="text-white/40 text-xs uppercase tracking-wider mb-3 flex items-center gap-2">
                            <span>Bonus: Total Goals</span>
                            {bonusAnswer !== null && <span className="text-white font-semibold normal-case tracking-normal">Actual: {bonusAnswer}</span>}
                        </div>
                        <div className="space-y-1.5">
                            {bonusGuesses.map(({ player, guess, winner }) => (
                                <div key={player} className="flex items-center gap-3 text-xs">
                                    <span className={`flex-1 truncate ${winner ? 'text-amber-400 font-medium' : 'text-white/50'}`}>
                                        {player}
                                    </span>
                                    <span className={`font-medium ${winner ? 'text-amber-400' : 'text-white/40'}`}>
                                        {guess}
                                    </span>
                                    {bonusAnswer !== null && (
                                        <span className={`text-white/25 w-10 text-right ${winner ? 'text-amber-400/60' : ''}`}>
                                            {winner ? '★ closest' : `off ${Math.abs(guess - bonusAnswer)}`}
                                        </span>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        </div>
    );
}


// ================================================================
// MAIN APP
// ================================================================
function App() {
    const [loadedWeeks, setLoadedWeeks] = useState(null);
    const [loading, setLoading] = useState(true);
    const [errors, setErrors] = useState([]);
    const [usingDemo, setUsingDemo] = useState(false);
    const [activeWeek, setActiveWeek] = useState(null);

    useEffect(() => {
        async function load() {
            const configured = WEEKS.filter(w => w.picksUrl);

            if (configured.length === 0) {
                setLoadedWeeks(DEMO_WEEKS);
                setUsingDemo(true);
                setLoading(false);
                return;
            }

            const errs = [];
            const loaded = await Promise.all(WEEKS.map(async (wk) => {
                if (!wk.picksUrl) return { ...wk, picks: [] };
                try {
                    const resp = await fetch(wk.picksUrl);
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const text = await resp.text();
                    return { ...wk, picks: parseFormCSV(text) };
                } catch (e) {
                    errs.push(`Week ${wk.week}: ${e.message}`);
                    return { ...wk, picks: [] };
                }
            }));

            setErrors(errs);
            setLoadedWeeks(loaded);
            setLoading(false);
        }
        load();
    }, []);

    const computed = useMemo(() => {
        if (!loadedWeeks) return null;
        return computeAll(loadedWeeks);
    }, [loadedWeeks]);

    const weeks = computed?.weeks || [];
    const displayWeek = activeWeek ?? (weeks.length > 0 ? weeks[weeks.length - 1] : null);
    const displayWeekDef = loadedWeeks?.find(w => w.week === displayWeek);

    if (loading) return (
        <div className="page-bg min-h-screen flex items-center justify-center">
            <div className="text-white/30 text-sm">Loading...</div>
        </div>
    );

    return (
        <div className="page-bg">
            <div className="max-w-lg mx-auto px-4 py-8 pb-16">
                <div className="text-center mb-8">
                    <div className="text-pink-500 text-xs uppercase tracking-widest font-semibold mb-1">NWSL {CONFIG.season}</div>
                    <h1 className="text-white text-2xl font-bold">{CONFIG.leagueName}</h1>
                </div>

                {usingDemo && (
                    <div className="demo-banner">
                        Showing demo data. Add your Google Sheet CSV URLs to <code className="font-mono">WEEKS</code> in the config at the top of this file.
                    </div>
                )}
                {errors.map((e, i) => (
                    <div key={i} className="error-banner">{e}</div>
                ))}

                {computed && (
                    <>
                        <PrizePool playerCount={computed.standings.length} />
                        <Leaderboard standings={computed.standings} weekScores={computed.weekScores} weeks={weeks} />

                        {weeks.length > 0 && (
                            <>
                                <div className="flex gap-2 overflow-x-auto pb-1 mb-4">
                                    {weeks.map(w => (
                                        <button key={w}
                                            onClick={() => setActiveWeek(w)}
                                            className={`week-pill ${displayWeek === w ? 'week-pill-active' : 'week-pill-inactive'}`}>
                                            Week {w}
                                        </button>
                                    ))}
                                </div>
                                {displayWeek !== null && displayWeekDef && (
                                    <WeekSection
                                        weekNum={displayWeek}
                                        weekDef={displayWeekDef}
                                        weekScore={computed.weekScores[displayWeek]}
                                    />
                                )}
                            </>
                        )}
                    </>
                )}

                <a href="https://buymeacoffee.com/samiprehn" target="_blank" rel="noopener noreferrer"
                    className="block text-center mt-8 text-white/20 text-sm hover:text-white/40 transition-colors"
                    style={{ textDecoration: 'none' }}>
                    🍽️ Keep this page running
                </a>
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
